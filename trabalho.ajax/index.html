<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>title</title>
</head>

<body>

    <label>Nome</label>
    <input type="text" id="nome">

    <br><br>

    <label>Senha</label>
    <input type="text" id="senha">

    <br><br>

    <input type="button" value="Validar" onclick="login()">

    <style>
        #valida {

            margin: auto;
            text-align: center;
            margin-left: 12%;

        }
    </style>


    <script type="module">

        import bcrypt from 'https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/+esm';

        window.login = async () => {

            const senha = document.getElementById("senha").value;
            const nome = document.getElementById("nome").value;

            const resposta = await fetch("https://samuca698.github.io/java-script-avan-ado/usuario2.json");
            const dados = await resposta.json();

            let acho = false;

            dados.forEach(user => {

                if (user.nome === nome) {

                    const senhaCripto = user.senha;

                    if (bcrypt.compareSync(senha, senhaCripto)) {
                        console.log("usuario e senha validos");
                        alert("usuario e senha validos");
                    } else {
                        alert("Senhas diferentes");
                    }

                    acho = true;
                }

            });

            if (!acho) {
                console.log("usuario e senha incorretas");
                alert("usuario e senha incorretas");
            }
        };

    </script>

</body>

</html>
